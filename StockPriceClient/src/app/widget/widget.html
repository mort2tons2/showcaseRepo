<mat-card class="example-card" appearance="raised">
  <mat-card-header>
    <mat-card-title>{{ ticker }}</mat-card-title>
    <mat-card-actions
      ><button matIconButton (click)="onRemoveClick()">
        <mat-icon>close</mat-icon>
      </button></mat-card-actions
    >
  </mat-card-header>

  <mat-card-content>
    <h4>${{ price$ | async | number: '1.2-2' }}</h4>
    <div class="chart-container">
      <canvas #stockChart></canvas>
    </div>

    <span
      [ngClass]="{
        'stock-up': currentChange >= 0,
        'stock-down': currentChange < 0,
      }"
    >
      {{ currentChange >= 0 ? '+' : '' }}{{ currentChange | number: '1.2-2' }} ({{
        currentChangePercent | number: '1.2-2'
      }}%)
    </span>
  </mat-card-content>
</mat-card>

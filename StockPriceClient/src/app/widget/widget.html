<mat-card class="example-card" appearance="raised">
  <mat-card-header>
    <mat-card-title>{{ ticker }}</mat-card-title>
    <mat-card-actions
      ><button matIconButton (click)="onRemoveClick()">
        <mat-icon>close</mat-icon>
      </button></mat-card-actions
    >
  </mat-card-header>

  <mat-card-content>
    <span>{{ price | number: '1.2-2' }}</span>
    Chart here

    <span
      [ngClass]="{
        'text-green-600': currentChange >= 0,
        'text-red-600': currentChange < 0,
      }"
    >
      {{ currentChange >= 0 ? '+' : '' }}{{ currentChange | number: '1.2-2' }} ({{
        currentChangePercent | number: '1.2-2'
      }}%)
    </span>
  </mat-card-content>
</mat-card>

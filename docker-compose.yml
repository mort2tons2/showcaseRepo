services:
  stockpriceapi:
    image: ${DOCKER_REGISTRY-}stockpriceapi
    container_name: StockPriceAPI
    build:
      context: .
      dockerfile: StockPriceAPI/Dockerfile
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - baseConnectionString=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER}
      - DbPassword=${DB_PASSWORD}
    depends_on:
      stockprices.database:
        condition: service_healthy
    restart: always
    networks:
      - "default"
   
  stockprices.database:
    image: postgres:latest
    container_name: stockprices.database
    environment:
      #- baseConnectionString=Host=stockprices.database;Port=5432;Database=${DB_DATABASE};Username=${DB_USER};Password=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    #volumes:
      #- ./.containers/database:/var/lib/postgresql
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 5
      #start_period: 10s
    networks:
      - "default"

networks:
  default:
    driver: bridge
   
